<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locus Terminal Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --terminal-font-family: 'JetBrains Mono', monospace;
            --terminal-font-size: 11px;
        }

        body {
            background: #1a1a1a;
            color: #d4d4d4;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
        }

        #header {
            background: #0a0a0a;
            border-bottom: 1px solid #333;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }

        #header h1 {
            font-size: 11px;
            font-weight: normal;
            color: #00ff00;
            margin: 0;
        }

        #header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #font-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #font-controls label {
            font-size: 10px;
            color: #666;
        }

        #font-controls select {
            background: #000;
            color: #aaa;
            border: 1px solid #333;
            border-radius: 0;
            padding: 2px 4px;
            font-size: 10px;
            font-family: inherit;
            cursor: pointer;
        }

        #font-controls select:hover {
            border-color: #666;
        }

        #view-switcher {
            display: flex;
            gap: 0;
        }

        .view-btn {
            padding: 2px 8px;
            background: transparent;
            color: #666;
            border: 1px solid #333;
            border-radius: 0;
            cursor: pointer;
            font-size: 10px;
            font-family: inherit;
        }

        .view-btn + .view-btn {
            border-left: none;
        }

        .view-btn:hover {
            color: #aaa;
        }

        .view-btn.active {
            background: #1a1a1a;
            color: #00ff00;
        }

        #status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: #666;
        }

        .status-indicator {
            width: 4px;
            height: 4px;
            border-radius: 0;
            background: #00ff00;
        }

        .view-container {
            display: none;
            height: calc(100vh - 23px);
        }

        .view-container.active {
            display: block;
        }

        /* Grid View Styles */
        #grid-panes-container {
            display: grid;
            gap: 2px;
            padding: 0;
            height: 100%;
            overflow: auto;
        }

        #grid-panes-container.count-1 { grid-template-columns: 1fr; }
        #grid-panes-container.count-2 { grid-template-columns: 1fr 1fr; }
        #grid-panes-container.count-3 { grid-template-columns: repeat(2, 1fr); }
        #grid-panes-container.count-4 { grid-template-columns: repeat(2, 1fr); }
        #grid-panes-container[class*="count-"] { grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }

        .pane {
            background: #000;
            border: 1px solid #333;
            border-radius: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 300px;
        }

        .pane-header {
            background: #0a0a0a;
            padding: 2px 6px;
            font-size: 10px;
            color: #666;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pane-id {
            color: #888;
            font-weight: normal;
        }

        .pane-name {
            color: #666;
        }

        .download-btn {
            background: transparent;
            color: #444;
            border: 1px solid #333;
            padding: 1px 4px;
            border-radius: 0;
            cursor: pointer;
            font-size: 9px;
            font-family: inherit;
            font-weight: normal;
        }

        .download-btn:hover {
            color: #888;
            border-color: #555;
        }

        .download-btn.downloading {
            color: #666;
            cursor: wait;
        }

        .pane-content {
            flex: 1;
            padding: 4px;
            overflow: auto;
            font-size: var(--terminal-font-size);
            line-height: 1.3;
            white-space: pre;
            font-family: var(--terminal-font-family);
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* Tmux Layout View Styles */
        #tmux-layout-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #1a1a1a;
        }

        #tmux-tabs {
            display: flex;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            overflow-x: auto;
        }

        .tmux-tab {
            padding: 2px 8px;
            background: transparent;
            color: #666;
            border-right: 1px solid #222;
            cursor: pointer;
            white-space: nowrap;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tmux-tab:hover {
            background: #111;
        }

        .tmux-tab.active {
            background: #1a1a1a;
            color: #00ff00;
        }

        #tmux-panes {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .tmux-pane {
            position: absolute;
            background: #000;
            border: 1px solid #333;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .tmux-pane-title {
            background: #0a0a0a;
            color: #666;
            padding: 2px 6px;
            font-size: 10px;
            border-bottom: 1px solid #222;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tmux-pane-content {
            flex: 1;
            padding: 4px;
            overflow: auto;
            font-size: var(--terminal-font-size);
            line-height: 1.3;
            white-space: pre;
            font-family: var(--terminal-font-family);
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .terminal-line {
            white-space: pre-wrap;
            word-break: break-all;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            font-size: 14px;
        }

        .error {
            color: #f48771;
            padding: 20px;
            text-align: center;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #3d3d3d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4d4d4d;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>🖥️ Locus Terminal Viewer</h1>
        <div id="header-right">
            <div id="font-controls">
                <label for="font-family">Font:</label>
                <select id="font-family">
                    <option value="JetBrains Mono" selected>JetBrains Mono</option>
                    <option value="Fira Code">Fira Code</option>
                    <option value="Monaco">Monaco</option>
                    <option value="Menlo">Menlo</option>
                    <option value="Consolas">Consolas</option>
                    <option value="SF Mono">SF Mono</option>
                    <option value="Courier New">Courier New</option>
                    <option value="monospace">monospace</option>
                </select>
                <label for="font-size">Size:</label>
                <select id="font-size">
                    <option value="9px">9px</option>
                    <option value="10px">10px</option>
                    <option value="11px" selected>11px</option>
                    <option value="12px">12px</option>
                    <option value="13px">13px</option>
                    <option value="14px">14px</option>
                    <option value="15px">15px</option>
                    <option value="16px">16px</option>
                </select>
            </div>
            <div id="view-switcher">
                <button class="view-btn active" data-view="grid">Grid View</button>
                <button class="view-btn" data-view="tmux">Tmux Layout</button>
            </div>
            <div id="status">
                <button id="download-all-btn" class="download-btn" style="display:none;" title="Download all panes as composite">💾 Download All</button>
                <div class="status-indicator"></div>
                <span id="status-text">Connected</span>
                <span id="pane-count">0 panes</span>
            </div>
        </div>
    </div>

    <!-- Grid View -->
    <div id="grid-view" class="view-container active">
        <div id="grid-panes-container" class="count-0">
            <div class="loading">Loading panes...</div>
        </div>
    </div>

    <!-- Tmux Layout View -->
    <div id="tmux-view" class="view-container">
        <div id="tmux-layout-container">
            <div id="tmux-tabs"></div>
            <div id="tmux-panes">
                <div class="loading">Loading layout...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let updateInterval = null;
        let currentPanes = new Set();
        let currentView = 'grid';
        let currentSession = null;
        let currentTab = null;
        let currentTmuxPanes = new Set();
        let lastTabStructure = null; // Track tab structure to avoid unnecessary re-renders
        let sessionsData = {}; // Store sessions data globally
        let isRenderingPanes = false; // Prevent concurrent pane renders

        // Font and size controls
        function applyFontSettings(fontFamily, fontSize) {
            console.log('Applying font settings:', { fontFamily, fontSize });

            // Build proper CSS font-family value with fallbacks
            let cssFontFamily;
            if (fontFamily === 'monospace') {
                cssFontFamily = 'monospace';
            } else {
                // Add quotes if font name has spaces, then add fallback
                const quotedFont = fontFamily.includes(' ') ? `'${fontFamily}'` : fontFamily;
                cssFontFamily = `${quotedFont}, monospace`;
            }

            document.documentElement.style.setProperty('--terminal-font-family', cssFontFamily);
            document.documentElement.style.setProperty('--terminal-font-size', fontSize);
            console.log('CSS vars set:', {
                family: getComputedStyle(document.documentElement).getPropertyValue('--terminal-font-family'),
                size: getComputedStyle(document.documentElement).getPropertyValue('--terminal-font-size')
            });

            // Save to localStorage
            localStorage.setItem('terminal-font-family', fontFamily);
            localStorage.setItem('terminal-font-size', fontSize);
        }

        // Load saved settings or use defaults
        function loadFontSettings() {
            const savedFamily = localStorage.getItem('terminal-font-family');
            const savedSize = localStorage.getItem('terminal-font-size');

            if (savedFamily) {
                document.getElementById('font-family').value = savedFamily;
                // Build proper CSS value
                let cssFontFamily;
                if (savedFamily === 'monospace') {
                    cssFontFamily = 'monospace';
                } else {
                    const quotedFont = savedFamily.includes(' ') ? `'${savedFamily}'` : savedFamily;
                    cssFontFamily = `${quotedFont}, monospace`;
                }
                document.documentElement.style.setProperty('--terminal-font-family', cssFontFamily);
            }

            if (savedSize) {
                document.getElementById('font-size').value = savedSize;
                document.documentElement.style.setProperty('--terminal-font-size', savedSize);
            }
        }

        // Font family selector
        const fontFamilySelect = document.getElementById('font-family');
        console.log('Font family select element:', fontFamilySelect);
        if (fontFamilySelect) {
            fontFamilySelect.addEventListener('change', (e) => {
                console.log('Font family changed:', e.target.value);
                const fontSize = document.getElementById('font-size').value;
                applyFontSettings(e.target.value, fontSize);
            });
        }

        // Font size selector
        const fontSizeSelect = document.getElementById('font-size');
        console.log('Font size select element:', fontSizeSelect);
        if (fontSizeSelect) {
            fontSizeSelect.addEventListener('change', (e) => {
                console.log('Font size changed:', e.target.value);
                const fontFamily = document.getElementById('font-family').value;
                applyFontSettings(fontFamily, e.target.value);
            });
        }

        // Load settings on page load
        loadFontSettings();

        // View switcher
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const view = btn.dataset.view;
                switchView(view);
            });
        });

        async function switchView(view) {
            currentView = view;

            // Update buttons
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });

            // Update containers
            document.querySelectorAll('.view-container').forEach(container => {
                container.classList.remove('active');
            });
            document.getElementById(`${view}-view`).classList.add('active');

            // Immediately refresh the new view
            await refresh();
        }

        // API functions
        async function fetchPanes() {
            try {
                const response = await fetch(`${API_BASE}/api/panes`);
                if (!response.ok) throw new Error('Failed to fetch panes');
                return await response.json();
            } catch (error) {
                console.error('Error fetching panes:', error);
                document.getElementById('status-text').textContent = 'Disconnected';
                return [];
            }
        }

        async function fetchPaneContent(paneId) {
            try {
                const response = await fetch(`${API_BASE}/api/pane/${encodeURIComponent(paneId)}`);
                if (!response.ok) throw new Error('Failed to fetch pane content');
                return await response.json();
            } catch (error) {
                console.error(`Error fetching pane ${paneId}:`, error);
                return null;
            }
        }

        async function fetchLayout() {
            try {
                const response = await fetch(`${API_BASE}/api/layout`);
                if (!response.ok) throw new Error('Failed to fetch layout');
                return await response.json();
            } catch (error) {
                console.error('Error fetching layout:', error);
                return null;
            }
        }

        // Download functions
        async function downloadPane(paneId) {
            const btn = event.target;
            btn.classList.add('downloading');
            btn.textContent = 'Recording...';

            try {
                const response = await fetch(`${API_BASE}/api/download/pane/${encodeURIComponent(paneId)}`);
                if (!response.ok) throw new Error('Download failed');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pane-${paneId.replace('%', '')}.cast`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                btn.textContent = '💾';
            } catch (error) {
                console.error('Download failed:', error);
                alert('Failed to download recording');
                btn.textContent = '💾';
            } finally {
                btn.classList.remove('downloading');
            }
        }

        async function downloadTab(session, tabIndex) {
            const btn = event.target;
            btn.classList.add('downloading');
            btn.textContent = 'Recording...';

            try {
                const response = await fetch(`${API_BASE}/api/download/tab/${encodeURIComponent(session)}/${encodeURIComponent(tabIndex)}`);
                if (!response.ok) throw new Error('Download failed');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `tab-${session}-${tabIndex}.cast`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                btn.textContent = '💾 Tab';
            } catch (error) {
                console.error('Download failed:', error);
                alert('Failed to download tab recording');
                btn.textContent = '💾 Tab';
            } finally {
                btn.classList.remove('downloading');
            }
        }

        async function downloadSession(session) {
            const btn = event.target;
            btn.classList.add('downloading');
            btn.textContent = 'Recording...';

            try {
                const response = await fetch(`${API_BASE}/api/download/session/${encodeURIComponent(session)}`);
                if (!response.ok) throw new Error('Download failed');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `session-${session}.cast`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                btn.textContent = '💾 All';
            } catch (error) {
                console.error('Download failed:', error);
                alert('Failed to download session recording');
                btn.textContent = '💾 All';
            } finally {
                btn.classList.remove('downloading');
            }
        }

        // Grid View Functions
        function createPaneElement(pane) {
            const div = document.createElement('div');
            div.className = 'pane';
            div.id = `pane-${pane.id}`;

            const header = document.createElement('div');
            header.className = 'pane-header';

            const info = document.createElement('div');
            info.innerHTML = `
                <span class="pane-id">${pane.id}</span>
                ${pane.name ? `<span class="pane-name">${pane.name}</span>` : ''}
            `;

            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'download-btn';
            downloadBtn.textContent = '💾';
            downloadBtn.title = 'Download pane recording (.cast)';
            downloadBtn.onclick = () => downloadPane(pane.id);

            header.appendChild(info);
            header.appendChild(downloadBtn);

            const content = document.createElement('div');
            content.className = 'pane-content';
            content.innerHTML = '<div class="loading">Loading...</div>';

            div.appendChild(header);
            div.appendChild(content);

            return div;
        }

        // Store previous content to detect changes
        const paneContentCache = new Map();

        async function updatePaneContent(paneId, autoScroll = true) {
            const paneDiv = document.getElementById(`pane-${paneId}`);
            if (!paneDiv) return;

            const content = await fetchPaneContent(paneId);
            if (!content) return;

            // Check if content changed
            const cachedContent = paneContentCache.get(paneId);
            if (cachedContent === content.html) {
                return; // No change, don't update
            }

            const contentDiv = paneDiv.querySelector('.pane-content');
            const wasAtBottom = contentDiv.scrollHeight - contentDiv.scrollTop - contentDiv.clientHeight < 50;

            // Use HTML for color support
            contentDiv.innerHTML = content.html;
            paneContentCache.set(paneId, content.html);

            // Auto-scroll to bottom if enabled and was already at bottom or first load
            if (autoScroll && (wasAtBottom || contentDiv.scrollTop === 0)) {
                // Use smooth scroll to reduce flashing
                contentDiv.scrollTo({ top: contentDiv.scrollHeight, behavior: 'instant' });
            }
        }

        async function refreshGridView() {
            const panes = await fetchPanes();

            if (panes.length === 0) {
                document.getElementById('grid-panes-container').innerHTML =
                    '<div class="error">No panes found. Make sure tmux is running with active panes.</div>';
                document.getElementById('pane-count').textContent = '0 panes';
                return;
            }

            const container = document.getElementById('grid-panes-container');
            const newPaneIds = new Set(panes.map(p => p.id));

            // Update grid class based on count
            container.className = `count-${panes.length}`;

            // Remove panes that no longer exist
            for (const oldId of currentPanes) {
                if (!newPaneIds.has(oldId)) {
                    const oldPane = document.getElementById(`pane-${oldId}`);
                    if (oldPane) oldPane.remove();
                    currentPanes.delete(oldId);
                }
            }

            // Add or update panes
            for (const pane of panes) {
                if (!currentPanes.has(pane.id)) {
                    // New pane
                    const paneEl = createPaneElement(pane);
                    container.appendChild(paneEl);
                    currentPanes.add(pane.id);
                }

                // Update content
                await updatePaneContent(pane.id);
            }

            document.getElementById('pane-count').textContent =
                `${panes.length} pane${panes.length === 1 ? '' : 's'}`;
            document.getElementById('status-text').textContent = 'Connected';

            // Show download all button if there are panes
            const downloadAllBtn = document.getElementById('download-all-btn');
            if (panes.length > 0) {
                downloadAllBtn.style.display = 'block';
                const sessionName = panes[0].session;
                downloadAllBtn.onclick = () => downloadSession(sessionName);
            } else {
                downloadAllBtn.style.display = 'none';
            }
        }

        // Tmux Layout View Functions
        async function refreshTmuxView() {
            const layout = await fetchLayout();
            if (!layout || !layout.sessions || layout.sessions.length === 0) return;

            // Build sessions structure from layout
            const sessions = {};
            for (const session of layout.sessions) {
                sessions[session.name] = {};
                for (const tab of session.tabs) {
                    // Use tab name and index as key
                    const tabKey = `${tab.index}:${tab.name}`;
                    sessions[session.name][tabKey] = {
                        index: tab.index,
                        name: tab.name,
                        panes: tab.panes
                    };
                }
            }

            // Store sessions data globally for use in click handlers
            sessionsData = sessions;

            // Use first session/tab if not set
            if (!currentSession && Object.keys(sessions).length > 0) {
                currentSession = Object.keys(sessions)[0];
                const firstSession = sessions[currentSession];
                if (Object.keys(firstSession).length > 0) {
                    currentTab = Object.keys(firstSession)[0];
                }
            }

            // Only re-render tabs if structure changed OR tabs don't exist in DOM
            const tabStructure = JSON.stringify(sessions);
            const tabsContainer = document.getElementById('tmux-tabs');
            const needsRender = tabStructure !== lastTabStructure || tabsContainer.children.length === 0;

            if (needsRender) {
                renderTabs(sessions);
                lastTabStructure = tabStructure;
            } else {
                // Just update active state without re-rendering
                updateTabActiveState();
            }

            // Render panes for current tab
            if (currentSession && currentTab && sessions[currentSession] && sessions[currentSession][currentTab]) {
                await renderTmuxPanes(sessions[currentSession][currentTab].panes);
            }
        }

        function updateTabActiveState() {
            // Update which tab is marked as active without re-rendering
            const allTabs = document.querySelectorAll('.tmux-tab');
            allTabs.forEach(tab => {
                const sessionName = tab.dataset.session;
                const tabKey = tab.dataset.tabKey;
                if (sessionName === currentSession && tabKey === currentTab) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
        }

        function renderTabs(sessions) {
            const tabsContainer = document.getElementById('tmux-tabs');
            tabsContainer.innerHTML = '';

            for (const [sessionName, tabs] of Object.entries(sessions)) {
                for (const [tabKey, tabData] of Object.entries(tabs)) {
                    const tab = document.createElement('div');
                    tab.className = 'tmux-tab';
                    tab.dataset.session = sessionName;
                    tab.dataset.tabKey = tabKey;
                    if (sessionName === currentSession && tabKey === currentTab) {
                        tab.classList.add('active');
                    }

                    // Add click handler to entire tab div
                    tab.addEventListener('click', async () => {
                        // Check if we're switching to a different tab
                        const switchingTabs = currentSession !== sessionName || currentTab !== tabKey;

                        currentSession = sessionName;
                        currentTab = tabKey;

                        // Update active state immediately
                        updateTabActiveState();

                        // If switching tabs, clear existing panes first to avoid state conflicts
                        if (switchingTabs) {
                            const container = document.getElementById('tmux-panes');
                            container.innerHTML = '';
                            currentTmuxPanes.clear();
                        }

                        // Render panes for this tab
                        if (sessionsData[sessionName] && sessionsData[sessionName][tabKey]) {
                            await renderTmuxPanes(sessionsData[sessionName][tabKey].panes);
                        }
                    });

                    const tabInfo = document.createElement('span');
                    // Display: index:name (pane_count)
                    tabInfo.textContent = `${tabData.index}:${tabData.name} (${tabData.panes.length})`;

                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'download-btn';
                    downloadBtn.textContent = '💾';
                    downloadBtn.title = 'Download tab recording';
                    downloadBtn.style.marginLeft = '8px';
                    downloadBtn.onclick = (e) => {
                        e.stopPropagation();
                        downloadTab(sessionName, tabData.index);
                    };

                    tab.appendChild(tabInfo);
                    tab.appendChild(downloadBtn);
                    tabsContainer.appendChild(tab);
                }
            }

            // Add a "Download All" button at the end
            if (Object.keys(sessions).length > 0) {
                const sessionName = Object.keys(sessions)[0];
                const downloadAllBtn = document.createElement('button');
                downloadAllBtn.className = 'download-btn';
                downloadAllBtn.textContent = '💾 All';
                downloadAllBtn.title = 'Download entire session recording';
                downloadAllBtn.style.margin = '8px';
                downloadAllBtn.onclick = (e) => {
                    e.stopPropagation();
                    downloadSession(sessionName);
                };
                tabsContainer.appendChild(downloadAllBtn);
            }
        }

        async function renderTmuxPanes(panes) {
            // Prevent concurrent renders which can cause state conflicts
            if (isRenderingPanes) {
                return;
            }
            isRenderingPanes = true;

            try {
                const container = document.getElementById('tmux-panes');
                const newPaneIds = new Set(panes.map(p => p.id));

            // Calculate layout (simple grid for now)
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            const cols = Math.ceil(Math.sqrt(panes.length));
            const rows = Math.ceil(panes.length / cols);
            const paneWidth = containerWidth / cols;
            const paneHeight = containerHeight / rows;

            // Remove panes that no longer exist
            for (const oldId of currentTmuxPanes) {
                if (!newPaneIds.has(oldId)) {
                    const oldPane = document.getElementById(`tmux-pane-${oldId}`);
                    if (oldPane) oldPane.remove();
                    currentTmuxPanes.delete(oldId);
                }
            }

            // Add or update panes
            for (let i = 0; i < panes.length; i++) {
                const pane = panes[i];
                const row = Math.floor(i / cols);
                const col = i % cols;

                let paneDiv = document.getElementById(`tmux-pane-${pane.id}`);

                if (!paneDiv) {
                    // Create new pane
                    paneDiv = document.createElement('div');
                    paneDiv.className = 'tmux-pane';
                    paneDiv.id = `tmux-pane-${pane.id}`;

                    const title = document.createElement('div');
                    title.className = 'tmux-pane-title';
                    title.style.display = 'flex';
                    title.style.justifyContent = 'space-between';
                    title.style.alignItems = 'center';

                    const titleText = document.createElement('span');
                    titleText.textContent = `${pane.id}`;

                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'download-btn';
                    downloadBtn.textContent = '💾';
                    downloadBtn.title = 'Download pane recording';
                    downloadBtn.onclick = () => downloadPane(pane.id);

                    title.appendChild(titleText);
                    title.appendChild(downloadBtn);

                    const content = document.createElement('div');
                    content.className = 'tmux-pane-content';
                    content.id = `tmux-pane-content-${pane.id}`;

                    paneDiv.appendChild(title);
                    paneDiv.appendChild(content);
                    container.appendChild(paneDiv);
                    currentTmuxPanes.add(pane.id);
                }

                // Update position (layout might change)
                paneDiv.style.left = `${col * paneWidth}px`;
                paneDiv.style.top = `${row * paneHeight}px`;
                paneDiv.style.width = `${paneWidth}px`;
                paneDiv.style.height = `${paneHeight}px`;

                // Update content only if changed OR if contentDiv is empty
                const contentDiv = document.getElementById(`tmux-pane-content-${pane.id}`);
                if (contentDiv) {
                    const paneContent = await fetchPaneContent(pane.id);
                    if (paneContent) {
                        const cachedContent = paneContentCache.get(`tmux-${pane.id}`);
                        const needsUpdate = cachedContent !== paneContent.html || contentDiv.innerHTML === '';

                        if (needsUpdate) {
                            const wasAtBottom = contentDiv.scrollHeight - contentDiv.scrollTop - contentDiv.clientHeight < 50;
                            contentDiv.innerHTML = paneContent.html;
                            paneContentCache.set(`tmux-${pane.id}`, paneContent.html);
                            // Auto-scroll to bottom only if was at bottom
                            if (wasAtBottom || contentDiv.scrollTop === 0) {
                                contentDiv.scrollTo({ top: contentDiv.scrollHeight, behavior: 'instant' });
                            }
                        }
                    }
                }
            }
            } finally {
                isRenderingPanes = false;
            }
        }

        // Main refresh function
        async function refresh() {
            if (currentView === 'grid') {
                await refreshGridView();
            } else if (currentView === 'tmux') {
                await refreshTmuxView();
            }
        }

        // Initialize
        async function init() {
            await refresh();

            // Refresh every 500ms
            updateInterval = setInterval(refresh, 500);
        }

        // Start when page loads
        document.addEventListener('DOMContentLoaded', init);

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (updateInterval) clearInterval(updateInterval);
        });
    </script>
</body>
</html>
