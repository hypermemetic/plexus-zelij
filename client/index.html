<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locus Terminal Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            color: #d4d4d4;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 11px;
            overflow: hidden;
            height: 100vh;
        }

        #header {
            background: #0a0a0a;
            border-bottom: 1px solid #333;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #header h1 {
            font-size: 11px;
            font-weight: normal;
            color: #00ff00;
        }

        #status {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
        }

        .status-indicator.disconnected {
            background: #ff0000;
        }

        #content {
            height: calc(100vh - 24px);
            overflow: auto;
            padding: 8px;
        }

        #tabs {
            display: flex;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            overflow-x: auto;
        }

        .tab {
            padding: 2px 8px;
            border-right: 1px solid #222;
            cursor: pointer;
            color: #666;
            white-space: nowrap;
        }

        .tab:hover {
            background: #1a1a1a;
            color: #aaa;
        }

        .tab.active {
            background: #1a1a1a;
            color: #00ff00;
        }

        #panes {
            display: grid;
            gap: 8px;
            padding: 8px;
        }

        .pane {
            border: 1px solid #333;
            background: #000;
        }

        .pane-header {
            background: #0a0a0a;
            padding: 2px 8px;
            border-bottom: 1px solid #333;
            font-size: 10px;
            color: #666;
        }

        .pane-content {
            padding: 8px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Monaco', 'Menlo', monospace;
            font-size: 11px;
            line-height: 1.3;
            white-space: pre;
            overflow: auto;
            max-height: 400px;
        }

        .error {
            color: #ff6b6b;
            padding: 16px;
            text-align: center;
        }

        .loading {
            color: #666;
            padding: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Locus Terminal Viewer (RPC)</h1>
        <div id="status">
            <div class="status-indicator" id="status-indicator"></div>
            <span id="status-text">Connecting...</span>
        </div>
    </div>

    <div id="tabs"></div>
    <div id="panes"><div class="loading">Connecting to RPC server...</div></div>

    <script type="module">
        import { createClient, Info, Panes } from './locus-client.js';

        let client;
        let currentTab = null;

        async function init() {
            try {
                // Connect to Locus RPC server
                client = await createClient({
                    backend: 'locus',
                    url: 'ws://127.0.0.1:44480'
                });

                updateStatus('Connected', true);
                await refreshLayout();

                // Refresh every 2 seconds
                setInterval(refreshLayout, 2000);
            } catch (error) {
                console.error('Failed to connect:', error);
                updateStatus('Connection failed: ' + error.message, false);
                document.getElementById('panes').innerHTML =
                    `<div class="error">Failed to connect to RPC server at ws://127.0.0.1:44480<br>Make sure plexus-locus is running</div>`;
            }
        }

        function updateStatus(text, connected) {
            document.getElementById('status-text').textContent = text;
            const indicator = document.getElementById('status-indicator');
            if (connected) {
                indicator.classList.remove('disconnected');
            } else {
                indicator.classList.add('disconnected');
            }
        }

        async function refreshLayout() {
            if (!client) return;

            try {
                // Get layout using RPC
                const layoutStream = client.info.dumpLayout();
                for await (const event of layoutStream) {
                    if (event.Layout) {
                        renderLayout(event.Layout.layout);
                    }
                }
            } catch (error) {
                console.error('Failed to refresh layout:', error);
            }
        }

        function renderLayout(layout) {
            const sessions = layout.sessions || {};
            const tabsContainer = document.getElementById('tabs');
            tabsContainer.innerHTML = '';

            // Render tabs
            for (const [sessionName, tabs] of Object.entries(sessions)) {
                for (const [tabKey, tabData] of Object.entries(tabs)) {
                    const tab = document.createElement('div');
                    tab.className = 'tab';
                    if (currentTab === `${sessionName}:${tabKey}`) {
                        tab.classList.add('active');
                    }
                    tab.textContent = `${tabData.index}:${tabData.name} (${tabData.panes.length})`;
                    tab.addEventListener('click', () => selectTab(sessionName, tabKey, tabData));
                    tabsContainer.appendChild(tab);
                }
            }

            // Auto-select first tab if none selected
            if (!currentTab && Object.keys(sessions).length > 0) {
                const firstSession = Object.keys(sessions)[0];
                const firstTab = Object.keys(sessions[firstSession])[0];
                selectTab(firstSession, firstTab, sessions[firstSession][firstTab]);
            } else if (currentTab) {
                // Refresh current tab
                const [sessionName, tabKey] = currentTab.split(':');
                if (sessions[sessionName] && sessions[sessionName][tabKey]) {
                    renderPanes(sessions[sessionName][tabKey].panes);
                }
            }
        }

        async function selectTab(sessionName, tabKey, tabData) {
            currentTab = `${sessionName}:${tabKey}`;

            // Update active tab
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            // Render panes for this tab
            await renderPanes(tabData.panes);
        }

        async function renderPanes(panes) {
            const panesContainer = document.getElementById('panes');
            panesContainer.innerHTML = '';

            if (panes.length === 0) {
                panesContainer.innerHTML = '<div class="loading">No panes in this tab</div>';
                return;
            }

            // Simple grid layout
            panesContainer.style.gridTemplateColumns = panes.length > 1 ? 'repeat(2, 1fr)' : '1fr';

            for (const pane of panes) {
                const paneDiv = document.createElement('div');
                paneDiv.className = 'pane';

                const header = document.createElement('div');
                header.className = 'pane-header';
                header.textContent = `${pane.id} ${pane.name || ''}`;

                const content = document.createElement('div');
                content.className = 'pane-content';
                content.textContent = 'Loading...';

                paneDiv.appendChild(header);
                paneDiv.appendChild(content);
                panesContainer.appendChild(paneDiv);

                // Fetch pane content via RPC
                fetchPaneContent(pane.id, content);
            }
        }

        async function fetchPaneContent(paneId, contentElement) {
            try {
                const stream = client.panes.capture(false, paneId);
                for await (const event of stream) {
                    if (event.PaneContent) {
                        // Use HTML if available, otherwise raw
                        contentElement.innerHTML = event.PaneContent.content.html ||
                                                   `<pre>${event.PaneContent.content.raw}</pre>`;
                    }
                }
            } catch (error) {
                console.error(`Failed to fetch pane ${paneId}:`, error);
                contentElement.textContent = 'Error loading pane content';
            }
        }

        // Initialize on page load
        init();
    </script>
</body>
</html>
